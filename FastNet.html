<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FastNet — Resilient 5G Internet</title>
<meta name="description" content="FastNet delivers primary and failover 5G internet engineered for homes, businesses, and the systems that keep them running." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* FastNet — Design Tokens & Global Styles */
:root {
  --ink-900: #0A0B0D; --ink-800: #14161A; --ink-700: #1C1F25; --ink-600: #2A2E36;
  --ink-500: #3A3F49; --ink-400: #5A606C; --ink-300: #8E939D; --ink-200: #BEC2C9; --ink-100: #E3E4E7;
  --bone-50:  #FAF8F4; --bone-100: #F4F1EC; --bone-200: #ECE7DF; --bone-300: #D9D3C9;
  --signal: oklch(0.86 0.17 118);
  --signal-soft: oklch(0.86 0.17 118 / 0.18);
  --signal-dim: oklch(0.62 0.12 118);
  --status-green: oklch(0.76 0.16 155);
  --status-amber: oklch(0.78 0.16 80);
  --status-red: oklch(0.66 0.20 25);
  --font-display: 'Instrument Serif', 'Times New Roman', serif;
  --font-sans: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
  --r-sm: 4px; --r-md: 8px; --r-lg: 14px; --r-xl: 22px;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bone-100); color: var(--ink-900);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}
body.theme-dark { background: var(--ink-900); color: var(--bone-100); }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }
.display-1 { font-family: var(--font-display); font-weight: 400; font-size: clamp(64px, 9vw, 148px); line-height: 0.94; letter-spacing: -0.03em; }
.display-2 { font-family: var(--font-display); font-weight: 400; font-size: clamp(48px, 6vw, 96px); line-height: 0.98; letter-spacing: -0.025em; }
.headline  { font-family: var(--font-sans);    font-weight: 500; font-size: clamp(32px, 3.6vw, 56px); line-height: 1.04; letter-spacing: -0.022em; }
.title     { font-family: var(--font-sans);    font-weight: 500; font-size: 28px; line-height: 1.15; letter-spacing: -0.015em; }
.body-lg   { font-size: 19px; line-height: 1.48; letter-spacing: -0.005em; font-weight: 400; }
.body      { font-size: 16px; line-height: 1.55; font-weight: 400; }
.caption   { font-size: 13px; line-height: 1.4; color: var(--ink-400); }
.mono-label{ font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-400); }
.mono-sm   { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.01em; }
.container { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
.signal-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--signal); box-shadow: 0 0 0 0 var(--signal);
  animation: pulse 2.2s ease-out infinite; display: inline-block;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 var(--signal-soft); }
  70%  { box-shadow: 0 0 0 12px rgba(0,0,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
}
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 22px; border-radius: 999px; font-size: 15px; font-weight: 500;
  letter-spacing: -0.005em; transition: all .18s ease; white-space: nowrap; }
.btn-primary { background: var(--ink-900); color: var(--bone-100); }
.btn-primary:hover { background: var(--ink-700); transform: translateY(-1px); }
.btn-signal { background: var(--signal); color: var(--ink-900); }
.btn-signal:hover { filter: brightness(1.05); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: inherit; border: 1px solid currentColor; opacity: 0.9; }
.btn-ghost:hover { opacity: 1; background: rgba(0,0,0,0.04); }
.theme-dark .btn-ghost:hover { background: rgba(255,255,255,0.06); }
.btn-sm { padding: 9px 16px; font-size: 13px; }
.btn-lg { padding: 18px 28px; font-size: 16px; }
.input { width: 100%; padding: 14px 16px; border: 1px solid var(--ink-100); border-radius: var(--r-md);
  font-size: 15px; background: var(--bone-50); transition: all .15s ease; }
.input:focus { outline: none; border-color: var(--ink-900); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
.theme-dark .input { background: var(--ink-800); border-color: var(--ink-600); color: var(--bone-100); }
.theme-dark .input:focus { border-color: var(--signal); box-shadow: 0 0 0 3px var(--signal-soft); }
.chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px 6px 10px;
  border-radius: 999px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; border: 1px solid var(--ink-100); background: var(--bone-50); color: var(--ink-500); }
.theme-dark .chip { border-color: var(--ink-600); background: var(--ink-800); color: var(--ink-200); }
.card { background: var(--bone-50); border: 1px solid var(--ink-100); border-radius: var(--r-lg); }
.theme-dark .card { background: var(--ink-800); border-color: var(--ink-600); }
.reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s ease, transform .7s ease; }
.reveal.in { opacity: 1; transform: translateY(0); }
#root { min-height: 100vh; }
.placeholder {
  background: repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0 1px, transparent 1px 14px), var(--bone-200);
  color: var(--ink-400); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  border-radius: var(--r-md);
}
.theme-dark .placeholder {
  background: repeating-linear-gradient(45deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 14px), var(--ink-700);
  color: var(--ink-300);
}
html { overflow-x: hidden; }

/* === Mobile-first responsive overrides === */
@media (max-width: 768px) {
  .container { padding: 0 18px !important; }

  /* Tighter section padding */
  section[style*="padding: 140px"], section[style*="padding: 120px"],
  section[style*="padding: 160px"], section[style*="padding: 80px 0 120px"],
  section[style*="padding: 80px 0;"], section[style*="padding: 80px 0 0"],
  section[style*="120px 0 80px"], section[style*="120px 0 60px"],
  section[style*="40px 0 120px"], section[style*="40px 0 80px"],
  section[style*="80px 0 40px"] {
    padding-top: 56px !important; padding-bottom: 56px !important;
  }

  /* Big type scales down */
  .display-1 { font-size: clamp(40px, 11vw, 60px) !important; line-height: 1 !important; }
  .display-2 { font-size: clamp(34px, 9vw, 52px) !important; }
  .headline  { font-size: clamp(26px, 7vw, 38px) !important; }
  .title     { font-size: 22px !important; }
  .body-lg   { font-size: 16px !important; }

  /* Buttons */
  .btn { padding: 12px 18px; font-size: 14px; }
  .btn-lg { padding: 14px 20px !important; font-size: 15px !important; }
  .btn-sm { padding: 8px 12px; font-size: 12px; }

  /* Inline-grid collapse — match React-rendered (no quotes) inline styles */
  div[style*="grid-template-columns: 1fr 1fr"]:not([data-keep]),
  div[style*="grid-template-columns: 1.1fr 1fr"],
  div[style*="grid-template-columns: 1.2fr 1fr"],
  div[style*="grid-template-columns: 1fr 1.2fr"],
  div[style*="grid-template-columns: 1.5fr 1fr"],
  div[style*="grid-template-columns: 1.6fr 1fr"],
  div[style*="grid-template-columns: 0.8fr 1.2fr 1fr"],
  div[style*="grid-template-columns: 1fr 1fr 1fr"],
  div[style*="grid-template-columns: repeat(2, 1fr)"],
  div[style*="grid-template-columns: repeat(3, 1fr)"] {
    grid-template-columns: 1fr !important;
    gap: 28px !important;
  }
  div[style*="grid-template-columns: repeat(4, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  div[style*="grid-template-columns: repeat(5, 1fr)"] {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px !important;
  }
  div[style*="grid-template-columns: 2fr 1fr 1fr 1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
    gap: 28px !important;
  }

  /* Sticky checkout aside → static */
  aside[style*="position: sticky"] {
    position: static !important;
    top: auto !important;
  }

  /* Calendar 5-col already collapsed via repeat(5) rule above */

  /* Hero metrics rail (4-col) → 2-col handled, shrink padding */
  div[style*="repeat(4, 1fr)"] > div { padding: 18px 14px !important; }
  div[style*="repeat(4, 1fr)"] > div div[style*="font-size: 44"] { font-size: 28px !important; }
  div[style*="repeat(4, 1fr)"] > div div[style*="font-size: 48"] { font-size: 28px !important; }

  /* Pricing big price */
  div[style*="font-size: 96"] { font-size: 64px !important; }

  /* Footer 5-col stack */
  footer[role], footer { }

  /* Tweaks panel narrower */
  [data-tweaks-panel] {
    width: calc(100vw - 24px) !important;
    max-width: 320px !important;
    right: 12px !important;
    bottom: 12px !important;
  }

  /* Hide product hero floating callouts on mobile (overlap product image) */
  [data-product-callout] { display: none !important; }

  /* Editorial hero header row */
  [data-hero-toprow] { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }

  /* Buttons grouped — wrap and full width */
  [data-btn-row] { flex-direction: column !important; align-items: stretch !important; }
  [data-btn-row] > .btn { width: 100% !important; justify-content: center !important; }

  /* Pull-quote inner */
  blockquote.display-2 { font-size: 28px !important; line-height: 1.2 !important; }

  /* Footer bottom rail stack */
  [data-footer-bottom] {
    flex-direction: column !important;
    gap: 14px !important;
    align-items: flex-start !important;
  }
  [data-footer-bottom] > div { flex-wrap: wrap !important; gap: 12px !important; }

  /* Dashboard header row stacks */
  [data-dash-head] { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
  [data-dash-head] > div { flex-wrap: wrap !important; }

  /* Checkout stepper horizontal scroll */
  [data-checkout-stepper] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  [data-checkout-stepper] button { min-width: 120px !important; flex: 0 0 auto !important; }

  /* Failover diagram size */
  [data-fail-diagram] { aspect-ratio: 1 / 1 !important; }

  /* Nav: hide desktop links + Consult, show burger */
  [data-desktop-nav] { display: none !important; }
  [data-consult-link] { display: none !important; }
  [data-mobile-burger] { display: inline-flex !important; }
}

@media (max-width: 480px) {
  .container { padding: 0 14px !important; }
  .btn { padding: 11px 14px; font-size: 13px; }
  .display-1 { font-size: 42px !important; }
  .display-2 { font-size: 32px !important; }
}

/* Mobile menu sheet */
[data-mobile-burger] { display: none; }
.mobile-sheet {
  position: fixed; inset: 0; background: #0A0B0D;
  backdrop-filter: blur(12px); z-index: 100;
  display: flex; flex-direction: column; padding: 88px 24px 32px;
  color: var(--bone-100);
}
.mobile-sheet button { padding: 18px 0; font-size: 22px; text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.08); color: var(--bone-100); }
.mobile-sheet .close-btn {
  position: absolute; top: 20px; right: 20px; padding: 12px;
  background: rgba(255,255,255,0.06); border-radius: 999px;
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/nav.jsx"></script>
<script type="text/babel" src="src/hero.jsx"></script>
<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/howitworks.jsx"></script>
<script type="text/babel" src="src/usecases.jsx"></script>
<script type="text/babel" src="src/pricing.jsx"></script>
<script type="text/babel" src="src/checkout.jsx"></script>
<script type="text/babel" src="src/availability.jsx"></script>
<script type="text/babel" src="src/consultation.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
